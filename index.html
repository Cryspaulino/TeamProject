<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Night Decider</title>
  <link rel="stylesheet" href="./main.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Work+Sans:wght@300;400;600&display=swap"
    rel="stylesheet"
  >
</head>
<body>
  <header class="site-header">
    <div class="container">
      <h1 class="site-title">Movie Night</h1>
      <nav>
        <a href="./login.html">Log In</a>
      </nav>
      <p class="site-tagline">Can't decide? We'll help you pick.</p>
    </div>
  </header>

  <main class="container">
    <section class="controls">
      <div class="filter-group">
        <label for="genre-filter">Filter by Genre:</label>
        <select id="genre-filter" class="genre-dropdown">
          <option value="all">All Genres</option>
          <option value="animation">Animation</option>
          <option value="comedy">Comedy</option>
          <option value="drama">Drama</option>
          <option value="historical">Historical</option>
          <option value="sci-fi">Sci-Fi</option>
        </select>
        <button id="random-movie-btn" class="btn btn-secondary" type="button">
          🎲 Pick Random Movie
        </button>
      </div>

      <a href="#watchlist" class="watchlist-btn">
        <span class="watchlist-icon">★</span>
        My Watchlist (<span id="watchlist-count">0</span>)
      </a>
    </section>

    <section class="movie-grid" id="movie-grid"></section>
  </main>

  <footer class="site-footer">
    <p>&copy; 2026 Movie Night Decider. Just try and steal our stuff...</p>
  </footer>

  <script type="module" src="./main.js"></script>
</body>
</html>
